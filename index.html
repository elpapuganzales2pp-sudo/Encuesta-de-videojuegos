<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Encuesta de Videojuegos</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Encuesta de Videojuegos</h1>
      <p>Cuéntanos qué prefieres y califica tus juegos favoritos.</p>
    </header>

    <form id="surveyForm">
      <div class="field">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
      </div>

      <div class="field">
        <label for="edad">Edad:</label>
        <input type="number" id="edad" name="edad" placeholder="Tu edad" min="10" max="100" required>
      </div>

      <div class="field">
        <label>¿Qué juegas normalmente?</label>
        <div class="radio-group">
          <label><input type="radio" name="normalmente" value="Roblox" required> 1. Roblox</label>
          <label><input type="radio" name="normalmente" value="Call of Duty"> 2. Call of Duty</label>
          <label><input type="radio" name="normalmente" value="Nada de las opciones"> 3. Nada de las opciones</label>
        </div>
      </div>

      <div class="field">
        <label for="plataforma">Plataforma favorita:</label>
        <select id="plataforma" name="plataforma" required>
          <option value="">Selecciona una</option>
          <option value="PC">PC</option>
          <option value="Consola">Consola</option>
          <option value="Móvil">Móvil</option>
          <option value="VR">Realidad virtual</option>
        </select>
      </div>

      <div class="field">
        <label>Género preferido:</label>
        <div class="checkbox-group">
          <label><input type="checkbox" name="genero" value="Acción"> Acción</label>
          <label><input type="checkbox" name="genero" value="Aventura"> Aventura</label>
          <label><input type="checkbox" name="genero" value="Deporte"> Deporte</label>
          <label><input type="checkbox" name="genero" value="RPG"> RPG</label>
          <label><input type="checkbox" name="genero" value="Estrategia"> Estrategia</label>
        </div>
      </div>

      <div class="field">
        <label for="juego">Juego favorito:</label>
        <input type="text" id="juego" name="juego" placeholder="Nombre del juego" required>
      </div>

      <div class="field">
        <label for="rating">¿Cómo calificas los videojuegos?</label>
        <input type="range" id="rating" name="rating" min="0" max="10" value="7">
        <span id="ratingValue">7</span>/10
      </div>

      <div class="field">
        <label for="comentarios">Comentarios adicionales:</label>
        <textarea id="comentarios" name="comentarios" rows="4" placeholder="Escribe aquí tus comentarios..."></textarea>
      </div>

      <button type="submit">Enviar encuesta</button>
    </form>

    <div id="result" class="result hidden">
      <h2>Gracias por participar</h2>
      <p id="resultText"></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
